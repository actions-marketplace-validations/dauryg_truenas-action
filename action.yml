name: 'TrueNAS Action'
description: 'Github action to interact with truenas through its JSON-RPC 2.0 websocket api'
author: Daury Guzman

inputs:
  host:
    description: 'WebSocket URL for TrueNAS Scale (e.g., wss://192.168.1.100/api/current)'
    required: true
  api-key:
    description: 'TrueNAS API key for authentication'
    required: true
  api-method:
    description: 'TrueNAS API method name (e.g., pool.query, alert.list, system.info)'
    required: true
  parameters:
    description: 'JSON array of method arguments. Format: [parameter 1, parameter 2]. Examples: [[], {"limit": 2}] (options only), [[["name","~",".*media.*"]], {"limit": 3, "select": ["name", "pool"]}] (with filter)'
    required: false
outputs:
  result:
    description: 'JSON response from the TrueNAS API call'
runs:
  using: 'node24'
  main: 'dist/index.js'